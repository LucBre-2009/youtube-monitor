<!DOCTYPE html>
<html lang="de">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>YouTube Channel ID Finder</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

    <h1>YouTube Channel ID Finder</h1>

    <p>
        Gib einen YouTube @Handle oder die vollständige URL ein.
    </p>

    <input
        type="text"
        id="input"
        placeholder="@LinusTechTips oder https://youtube.com/@LinusTechTips"
    >

    <button onclick="findID()">
        Channel ID finden
    </button>


    <div id="result" class="hidden">

        <h2>Channel ID</h2>

        <code id="channelID"></code>

        <br><br>

        <button onclick="copyID()">
            ID kopieren
        </button>

    </div>


    <p id="error"></p>

</div>

<script src="script.js"></script>

</body>
</html>
