<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>YouTube Channel ID Finder</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <h1>📺 YouTube Channel ID Finder</h1>

    <p>
        Gib eine YouTube URL oder einen @Handle ein.
    </p>


    <input 
        id="channelInput"
        placeholder="@Kanalname oder YouTube URL"
    >

    <button onclick="findChannel()">
        Channel ID finden
    </button>


    <div id="result" class="result hidden">

        <h2>Ergebnis</h2>

        <p>
            <b>Name:</b>
            <span id="channelName"></span>
        </p>

        <p>
            <b>Channel ID:</b>
        </p>

        <code id="channelId"></code>


        <button onclick="copyId()">
            ID kopieren
        </button>

    </div>


    <p id="error" class="error"></p>

</div>


<script src="script.js"></script>

</body>
</html>
